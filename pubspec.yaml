name: pet_care
description: "A comprehensive Pet Care marketplace built with Flutter and Supabase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # --- BACKEND & AUTH ---
  supabase_flutter: ^2.12.0
  google_sign_in: ^6.2.1
  firebase_core: ^3.1.1 # 👈 Added for Push Notifications
  firebase_messaging: ^15.0.3

  # --- STATE & NAVIGATION ---
  flutter_riverpod: ^2.5.1 # Optimized version
  go_router: ^14.2.0

  # --- MAPS & LOCATION ---
  google_maps_flutter: ^2.5.3
  geolocator: ^12.0.0

  # --- PAYMENTS (Priority 2) ---
  flutter_stripe: ^10.1.1
  razorpay_flutter: ^1.4.1
  http: ^1.1.0

  # --- UI & UTILITIES ---
  image_picker: ^1.2.1 
  path: ^1.9.0
  table_calendar: ^3.1.2 
  flutter_rating_bar: ^4.0.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/